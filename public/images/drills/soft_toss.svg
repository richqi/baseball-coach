<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="400" height="280" fill="white"/>

  <text x="200" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#0F172A">Soft Toss Drill</text>
  <text x="200" y="44" text-anchor="middle" font-size="11" fill="#64748B">Top-down view — partner feeds from 45° angle</text>

  <!-- Home plate -->
  <polygon points="200,215 220,200 220,182 180,182 180,200" fill="#0F172A" opacity="0.15" stroke="#0F172A" stroke-width="1.5"/>
  <text x="200" y="230" text-anchor="middle" font-size="9" fill="#94A3B8">home plate</text>

  <!-- Batter (circle = top-down figure) -->
  <circle cx="200" cy="155" r="20" fill="#EFF6FF" stroke="#0066FF" stroke-width="2.5"/>
  <text x="200" y="150" text-anchor="middle" font-size="9" fill="#0066FF" font-weight="bold">BATTER</text>
  <!-- Bat direction (horizontal, pointing left toward toss) -->
  <line x1="180" y1="155" x2="130" y2="148" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <polygon points="126,147 136,142 136,153" fill="#475569"/>

  <!-- Feeder position (45° to the side) -->
  <circle cx="105" cy="100" r="20" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="105" y="95" text-anchor="middle" font-size="9" fill="#F59E0B" font-weight="bold">FEEDER</text>
  <text x="105" y="107" text-anchor="middle" font-size="8" fill="#F59E0B">45° angle</text>

  <!-- 45° angle indicator -->
  <path d="M 200,155 L 200,115 A 40,40 0 0,0 170,128 Z" fill="#0066FF" opacity="0.06"/>
  <text x="195" y="125" font-size="9" fill="#0066FF">45°</text>

  <!-- Ball trajectory arc (toss path from feeder to contact zone) -->
  <path d="M 120,108 Q 145,130 148,152" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
  <!-- Ball in flight -->
  <circle cx="134" cy="128" r="7" fill="#F59E0B"/>
  <!-- Arrow at contact zone -->
  <polygon points="149,157 144,147 153,148" fill="#F59E0B"/>

  <!-- Contact zone box -->
  <rect x="136" y="143" width="28" height="24" rx="4" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="150" y="175" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="bold">contact</text>
  <text x="150" y="186" text-anchor="middle" font-size="9" fill="#EF4444">zone</text>

  <!-- Distance label -->
  <line x1="105" y1="120" x2="105" y2="145" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="105" y1="145" x2="180" y2="158" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="130" y="168" font-size="9" fill="#94A3B8">~15–20 ft</text>

  <!-- Tips row -->
  <rect x="18" y="200" width="112" height="58" rx="6" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="74" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#F59E0B">Feed pace</text>
  <text x="74" y="235" text-anchor="middle" font-size="9" fill="#0F172A">Slow, looping</text>
  <text x="74" y="249" text-anchor="middle" font-size="9" fill="#0F172A">underhand toss</text>

  <rect x="144" y="200" width="112" height="58" rx="6" fill="#EFF6FF" stroke="#0066FF" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#0066FF">Focus on</text>
  <text x="200" y="235" text-anchor="middle" font-size="9" fill="#0F172A">Hand path &amp;</text>
  <text x="200" y="249" text-anchor="middle" font-size="9" fill="#0F172A">contact point</text>

  <rect x="270" y="200" width="112" height="58" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="326" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#10B981">Reps</text>
  <text x="326" y="235" text-anchor="middle" font-size="9" fill="#0F172A">20–30 per</text>
  <text x="326" y="249" text-anchor="middle" font-size="9" fill="#0F172A">session</text>
</svg>
