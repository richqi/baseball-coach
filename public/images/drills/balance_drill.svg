<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="400" height="280" fill="white"/>

  <text x="200" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#0F172A">Balance Drill — Leg Lift Hold</text>
  <text x="200" y="44" text-anchor="middle" font-size="11" fill="#64748B">Hold leg-lift position for 3 seconds before delivering</text>

  <!-- Pitcher figure (side view) in leg-lift position -->
  <!-- Support leg -->
  <line x1="200" y1="185" x2="200" y2="225" stroke="#0F172A" stroke-width="5" stroke-linecap="round"/>
  <!-- Foot on ground -->
  <line x1="185" y1="225" x2="215" y2="225" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>

  <!-- Body torso -->
  <line x1="200" y1="130" x2="200" y2="185" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="200" cy="118" r="13" fill="none" stroke="#0F172A" stroke-width="3"/>

  <!-- Raised leg (knee up) -->
  <line x1="200" y1="185" x2="185" y2="158" stroke="#0066FF" stroke-width="5" stroke-linecap="round"/>
  <line x1="185" y1="158" x2="165" y2="175" stroke="#0066FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Glove arm (forward) -->
  <line x1="200" y1="148" x2="165" y2="138" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="158" cy="136" r="9" fill="#475569"/>

  <!-- Throwing arm (back/up) -->
  <line x1="200" y1="148" x2="230" y2="138" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="237" cy="136" r="7" fill="none" stroke="#0F172A" stroke-width="2.5"/>

  <!-- Balance point marker -->
  <line x1="190" y1="130" x2="175" y2="130" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="134" font-size="9" fill="#F59E0B" font-weight="bold">balance point</text>
  <circle cx="190" cy="130" r="4" fill="#F59E0B"/>

  <!-- Timer graphic -->
  <circle cx="315" cy="148" r="38" fill="none" stroke="#0066FF" stroke-width="3"/>
  <circle cx="315" cy="148" r="34" fill="#EFF6FF"/>
  <!-- Clock hands showing 3 seconds (hand pointing to 12) -->
  <line x1="315" y1="148" x2="315" y2="120" stroke="#0066FF" stroke-width="3" stroke-linecap="round"/>
  <line x1="315" y1="148" x2="332" y2="160" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
  <circle cx="315" cy="148" r="3" fill="#0066FF"/>
  <text x="315" y="177" text-anchor="middle" font-size="22" font-weight="bold" fill="#0066FF">3s</text>
  <text x="315" y="193" text-anchor="middle" font-size="9" fill="#64748B">HOLD</text>

  <!-- Ground line -->
  <line x1="60" y1="225" x2="270" y2="225" stroke="#CBD5E1" stroke-width="2"/>
  <text x="165" y="240" text-anchor="middle" font-size="9" fill="#94A3B8">ground</text>

  <!-- Tip -->
  <line x1="20" y1="252" x2="380" y2="252" stroke="#E2E8F0" stroke-width="1"/>
  <text x="200" y="268" text-anchor="middle" font-size="10" fill="#64748B">Builds proprioception and a repeatable, controlled stride</text>
</svg>
