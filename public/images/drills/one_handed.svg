<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="400" height="280" fill="white"/>

  <text x="200" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#0F172A">One-Handed Drill</text>
  <text x="200" y="44" text-anchor="middle" font-size="11" fill="#64748B">Train each hand independently to fix path and extension</text>

  <!-- LEFT SIDE: Bottom hand drill -->
  <text x="95" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#0066FF">Bottom Hand</text>
  <text x="95" y="82" text-anchor="middle" font-size="10" fill="#64748B">palm faces up at contact</text>

  <!-- Simplified side-view batter (stick figure) -->
  <!-- Body -->
  <line x1="85" y1="105" x2="85" y2="155" stroke="#0F172A" stroke-width="3"/>
  <!-- Head -->
  <circle cx="85" cy="97" r="10" fill="none" stroke="#0F172A" stroke-width="2.5"/>
  <!-- Legs -->
  <line x1="85" y1="155" x2="70" y2="185" stroke="#0F172A" stroke-width="2.5"/>
  <line x1="85" y1="155" x2="100" y2="185" stroke="#0F172A" stroke-width="2.5"/>
  <!-- Bottom arm holding bat -->
  <line x1="85" y1="120" x2="55" y2="130" stroke="#0066FF" stroke-width="3"/>
  <!-- Bat -->
  <line x1="55" y1="130" x2="20" y2="122" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <!-- Top arm released (floating) -->
  <line x1="85" y1="120" x2="110" y2="110" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="115" cy="108" r="5" fill="#CBD5E1"/>
  <!-- Palm-up arc -->
  <path d="M 22,128 Q 30,140 22,148" stroke="#0066FF" stroke-width="2" fill="none"/>
  <text x="8" y="148" font-size="9" fill="#0066FF" font-weight="bold">↑</text>
  <text x="3" y="160" font-size="8" fill="#0066FF">palm up</text>

  <!-- Divider -->
  <line x1="200" y1="60" x2="200" y2="220" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- RIGHT SIDE: Top hand drill -->
  <text x="305" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#10B981">Top Hand</text>
  <text x="305" y="82" text-anchor="middle" font-size="10" fill="#64748B">palm faces down through extension</text>

  <!-- Batter figure -->
  <line x1="295" y1="105" x2="295" y2="155" stroke="#0F172A" stroke-width="3"/>
  <circle cx="295" cy="97" r="10" fill="none" stroke="#0F172A" stroke-width="2.5"/>
  <line x1="295" y1="155" x2="280" y2="185" stroke="#0F172A" stroke-width="2.5"/>
  <line x1="295" y1="155" x2="310" y2="185" stroke="#0F172A" stroke-width="2.5"/>
  <!-- Top arm holding bat + extending -->
  <line x1="295" y1="120" x2="325" y2="112" stroke="#10B981" stroke-width="3"/>
  <!-- Bat extending out -->
  <line x1="325" y1="112" x2="368" y2="108" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom arm released -->
  <line x1="295" y1="120" x2="268" y2="130" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="263" cy="132" r="5" fill="#CBD5E1"/>
  <!-- Palm-down arc -->
  <path d="M 362,102 Q 375,112 362,122" stroke="#10B981" stroke-width="2" fill="none"/>
  <text x="376" y="114" font-size="8" fill="#10B981">palm</text>
  <text x="376" y="124" font-size="8" fill="#10B981">down</text>

  <!-- Divider + tip -->
  <line x1="20" y1="230" x2="380" y2="230" stroke="#E2E8F0" stroke-width="1"/>
  <text x="200" y="248" text-anchor="middle" font-size="10" fill="#64748B">Do 15 reps each hand. Focus on feel, not power.</text>
  <text x="200" y="262" text-anchor="middle" font-size="10" fill="#64748B">Correct hand path = straighter, more consistent contact.</text>
</svg>
